const fN  = n => Math.round(n).toLocaleString("es-AR");
const fM  = n => "$"+Math.abs(Math.round(n)).toLocaleString("es-AR");
const fS  = n => (n<0?"-$":"$")+Math.abs(Math.round(n)).toLocaleString("es-AR");
const fP  = n => (!isFinite(n)||n===null)?"—":n.toFixed(1)+"%";
const fR  = n => (!isFinite(n)||n===null)?"—":(n>=0?"+":"")+n.toFixed(1)+"%";
const pct = (a,b) => b===0?null:(a-b)/Math.abs(b)*100;
const roiCalc  = (ng,co) => co>0?(ng-co)/co*100:null;
const roiMoney = (ng,co) => ng-co;
const roiColor = v => v===null?"#777":v>=0?"#22c55e":"#ef4444";
const sumRows  = rows => rows.reduce((a,r)=>({cl:a.cl+r.cl,sg:a.sg+r.sg,ft:a.ft+r.ft,dep:a.dep+r.dep,ng:a.ng+r.ng,co:a.co+r.co}),{cl:0,sg:0,ft:0,dep:0,ng:0,co:0});
const getRows  = (mo,brand) => { const rows=(DATA[mo]||[]).filter(r=>r.cl>0||r.sg>0||r.ft>0); return brand==="ALL"?rows:rows.filter(r=>r.ch===brand); };
const getMo    = (mo,brand) => brand==="ALL"?(MONTHLY[mo]||{cl:0,sg:0,ft:0,dep:0,ng:0,co:0}):sumRows(getRows(mo,brand));

function Panel({children,style}){return <div style={{background:"#1a1a1a",border:"1px solid #2e2e2e",borderRadius:10,overflow:"hidden",marginBottom:14,...(style||{})}}>{children}</div>;}
function PH({title,sub}){return <div style={{padding:"13px 18px",borderBottom:"1px solid #2e2e2e"}}><div style={{fontSize:14,fontWeight:800}}>{title}</div>{sub&&<div style={{fontSize:11,color:"#777",marginTop:2}}>{sub}</div>}</div>;}
function Bar({val,max,color}){return <div style={{flex:1,background:"#2a2a2a",borderRadius:3,height:7,overflow:"hidden",margin:"0 8px"}}><div style={{width:`${Math.max(0,Math.min(100,val/Math.max(max,1)*100))}%`,height:"100%",background:color||"#E84200",borderRadius:3}}/></div>;}
function Delta({curr,prev}){const d=pct(curr,prev);if(d===null||!isFinite(d))return null;const up=d>=0;return <span style={{fontSize:11,fontWeight:600,color:up?"#22c55e":"#ef4444",marginLeft:4}}>{up?"▲":"▼"}{Math.abs(d).toFixed(1)}%</span>;}
function Pill({v}){const c=v>=20?"#22c55e":v>=10?"#eab308":"#ef4444";return <span style={{background:c+"22",color:c,padding:"1px 7px",borderRadius:10,fontSize:10,fontWeight:700}}>{fP(v)}</span>;}
function KCard({label,val,prev,fmt,accent,valStyle}){const f=fmt||fN;return <div style={{background:"#1a1a1a",border:"1px solid #2e2e2e",borderRadius:10,padding:"12px 11px",borderTop:`3px solid ${accent||"#E84200"}`,flex:1,minWidth:90}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"#777",marginBottom:3}}>{label}</div><div style={{fontFamily:"Georgia,serif",fontSize:20,lineHeight:1,marginBottom:5,color:"#f0f0f0",...(valStyle||{})}}>{f(val)}</div>{prev!==undefined&&<Delta curr={val} prev={prev}/>}</div>;}
function STh({label,f,sort,setSort,align}){const active=sort.f===f;return <th onClick={()=>setSort(p=>({f,d:p.f===f&&p.d==="desc"?"asc":"desc"}))} style={{padding:"8px 10px",textAlign:align||"right",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,color:active?"#E84200":"#777",cursor:"pointer",whiteSpace:"nowrap",background:"#222",position:"sticky",top:0,zIndex:1,userSelect:"none"}}>{label}{active?(sort.d==="desc"?" ▼":" ▲"):" ⇅"}</th>;}

const MDEFS={ft:{label:"Dep. 1°",color:"#E84200",fmt:fN},ng:{label:"NGR",color:"#22c55e",fmt:fS},dep:{label:"Depósitos",color:"#3b82f6",fmt:fM},sg:{label:"Registros",color:"#f97316",fmt:fN},co:{label:"Costo Afil.",color:"#a855f7",fmt:fM},cr:{label:"Tasa Conv.",color:"#ec4899",fmt:fP}};

  const ref=useRef(null);

  const draw=useCallback((hl=-1)=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext("2d"),W=cv.offsetWidth||600,H=160,dpr=window.devicePixelRatio||1;
    cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";ctx.scale(dpr,dpr);
    const pad={l:62,r:16,t:16,b:30},meta=MDEFS[metric];
    const vals=MONTHS.map(m=>{const d=getMo(m,brand);return metric==="cr"?(d.sg>0?d.ft/d.sg*100:0):d[metric]||0;});
    const max=Math.max(...vals.map(v=>v<0?0:v),1),min=Math.min(...vals,0),range=max-min||1;
    const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b,bw=iW/MONTHS.length,zY=pad.t+iH*(max/range);
    st.current={vals,meta,bw,pad};
    for(let i=0;i<=4;i++){const y=pad.t+iH*(i/4),v=max-(range*i/4);ctx.strokeStyle="#2a2a2a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle="#555";ctx.font="9px sans-serif";ctx.textAlign="right";ctx.fillText(meta.fmt(v).slice(0,9),pad.l-5,y+3);}
    const pts=[];
    vals.forEach((v,i)=>{
      const cx=pad.l+bw*i+bw/2,bh=Math.abs(v/range)*iH,by=v>=0?zY-bh:zY,x=pad.l+bw*i+bw*.18,bw2=bw*.64,isHl=hl===i;
      const g=ctx.createLinearGradient(0,by,0,by+bh);g.addColorStop(0,meta.color+(isHl?"ff":"99"));g.addColorStop(1,meta.color+(isHl?"44":"11"));
      ctx.fillStyle=v<0?(isHl?"#ef444499":"#ef444444"):g;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,by,bw2,bh,[3,3,0,0]);else ctx.rect(x,by,bw2,bh);ctx.fill();
      const cy=v>=0?zY-bh:zY+bh;pts.push({cx,cy});
      ctx.fillStyle=isHl?"#f0f0f0":"#555";ctx.font=(isHl?"bold ":"")+"9px sans-serif";ctx.textAlign="center";ctx.fillText(SHORT[MONTHS[i]],cx,H-pad.b+14);
    });
    st.current.pts=pts;
    ctx.strokeStyle=meta.color;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.lineCap="round";ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.cx,p.cy):ctx.lineTo(p.cx,p.cy));ctx.stroke();
    pts.forEach((p,i)=>{const isHl=hl===i;ctx.beginPath();ctx.arc(p.cx,p.cy,isHl?7:5,0,Math.PI*2);ctx.fillStyle=meta.color;ctx.globalAlpha=hl>=0&&!isHl?0.4:1;ctx.fill();ctx.globalAlpha=1;ctx.strokeStyle=isHl?"#fff":"#0f0f0f";ctx.lineWidth=isHl?2.5:2;ctx.stroke();});
  },[metric,brand]);
  useEffect(()=>{draw();},[draw]);
  const onMove=useCallback(e=>{
    const cv=ref.current;if(!cv)return;

  },[draw,brand]);
  const onLeave=useCallback(()=>{setTip(null);draw(-1);},[draw]);
  function Spark({mk,color}){
    const vals=MONTHS.map(m=>{const d=getMo(m,brand);return mk==="cr"?(d.sg>0?d.ft/d.sg*100:0):d[mk]||0;});

function PasswordScreen({onUnlock}){
  const [val,setVal]=useState(""),[err,setErr]=useState(false),inp=useRef(null);
  useEffect(()=>{inp.current&&inp.current.focus();},[]);
  const go=()=>{if(val.trim()===PASSWORD){onUnlock();}else{setErr(true);setVal("");setTimeout(()=>setErr(false),1500);}};
  return <div style={{minHeight:"100vh",background:"#0f0f0f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
    <div style={{textAlign:"center",marginBottom:32}}>
      <div style={{width:60,height:60,background:"#E84200",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:900,color:"#fff",fontStyle:"italic",fontFamily:"Georgia,serif",margin:"0 auto 14px"}}>W</div>
      <div style={{fontSize:26,fontWeight:900,color:"#fff",letterSpacing:-.5}}>BetWarrior</div>
      <div style={{fontSize:13,color:"#777",marginTop:4}}>Panel de Afiliados</div>
    </div>
    <div style={{background:"#1a1a1a",border:`1px solid ${err?"#ef4444":"#2e2e2e"}`,borderRadius:14,padding:"32px 40px",width:320,textAlign:"center"}}>
      <div style={{fontSize:13,color:"#777",marginBottom:18}}>Ingresá tu contraseña de acceso</div>
      <input ref={inp} type="password" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Contraseña"
        style={{width:"100%",background:"#111",border:`1px solid ${err?"#ef4444":"#2e2e2e"}`,borderRadius:8,padding:"11px 14px",fontSize:14,color:"#f0f0f0",outline:"none",marginBottom:12,fontFamily:"inherit",boxSizing:"border-box"}}/>
      {err&&<div style={{fontSize:12,color:"#ef4444",marginBottom:10}}>Contraseña incorrecta. Intentá de nuevo.</div>}
      <button onClick={go} style={{width:"100%",background:"#E84200",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700}}>INGRESAR AL PANEL</button>
    </div>
    <div style={{marginTop:18,fontSize:11,color:"#444"}}>Protegido · BetWarrior 2026</div>
  </div>;
}

              {td(fM(pTot.co),{fontWeight:700})}
              <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:roiColor(pROI)}}>{fR(pROI)}</td>
              <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:roiColor(pROIM)}}>{fS(pROIM)}</td>
            </tr></tfoot>
          </table>
        </div>
      </Panel>}

      {tab==="geo"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          {Object.entries(BY_BRAND).map(([b,v])=>{const rv=roiCalc(v.ng,v.co);return <div key={b} style={{background:"#1a1a1a",border:"1px solid #2e2e2e",borderTop:`3px solid ${BCOLS[b]}`,borderRadius:10,padding:"13px 16px"}}>
            <div style={{fontSize:13,fontWeight:800,color:BCOLS[b],marginBottom:10}}>{b.replace("BetWarrior ","")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[["Dep. 1°",fN(v.ft),"#E84200"],["Registros",fN(v.sg),"#f97316"],["Clics",fN(v.cl),"#06b6d4"],["NGR",fS(v.ng),v.ng>=0?"#22c55e":"#ef4444"],["Depósitos",fM(v.dep),"#3b82f6"],["ROI %",fR(rv),roiColor(rv)],["ROI $",fS(v.ng-v.co),roiColor(v.ng-v.co)]].map(([l,val,c])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:10,color:"#777",textTransform:"uppercase",letterSpacing:.4}}>{l}</span>
                  <span style={{fontWeight:700,fontSize:13,color:c}}>{val}</span>
                </div>
              ))}
            </div>
          </div>;})}
        </div>
        <Panel>
          <PH title="Top Partners por Marca" sub="Últimos 6 meses · Dep. 1°, Registros, Clics y ROI"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
            {BRANDS.map((b,bi)=>{
              const affs=Object.entries(affByBrand[b]||{}).sort((a,c)=>c[1].ft-a[1].ft).slice(0,8),mxF=Math.max(...affs.map(a=>a[1].ft),1),col=BCOLS[b];
              return <div key={b} style={{padding:"16px 18px",borderRight:bi%2===0?"1px solid #2e2e2e":"none",borderBottom:"1px solid #2e2e2e"}}>
                <div style={{fontSize:13,fontWeight:800,color:col,marginBottom:10}}>{b.replace("BetWarrior ","")}</div>
                {affs.length===0&&<div style={{color:"#777",fontSize:12}}>Sin datos</div>}
                {affs.map(([a,v],i)=>{const rv=roiCalc(v.ng,v.co);return <div key={a} style={{marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",marginBottom:3}}>
                    <div style={{width:16,fontSize:10,color:"#555",marginRight:6,flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1,fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a}</div>
                    <Bar val={v.ft} max={mxF} color={col}/>
                    <div style={{fontSize:11,fontWeight:700,color:col,width:28,textAlign:"right"}}>{v.ft}</div>
                  </div>
                  <div style={{paddingLeft:22,display:"flex",gap:12,flexWrap:"wrap"}}>
                    {[["Reg.",fN(v.sg),"#f97316"],["Clics",fN(v.cl),"#06b6d4"],["ROI%",fR(rv),roiColor(rv)],["ROI$",fS(v.ng-v.co),roiColor(v.ng-v.co)]].map(([l,val,c])=>(
                      <span key={l} style={{fontSize:10,color:c}}><span style={{color:"#555"}}>{l}:</span> {val}</span>
                    ))}
                  </div>
                </div>;})}
              </div>;
            })}
          </div>
        </Panel>
      </div>}

      {tab==="trends"&&<div>
        <Panel>
          <div style={{padding:"13px 18px",borderBottom:"1px solid #2e2e2e",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div><div style={{fontSize:14,fontWeight:800}}>Resultados Mensuales Completos</div><div style={{fontSize:11,color:"#777",marginTop:2}}>Todas las métricas con variación mensual</div></div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{["ALL",...BRANDS].map(b=>{const lbl=b==="ALL"?"Todos":BRAND_SHORT[b]||b;return <button key={b} onClick={()=>setTBrand(b)} style={{padding:"4px 11px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,background:tBrand===b?"#E84200":"#222",color:tBrand===b?"#fff":"#777"}}>{lbl}</button>;})}</div>
          </div>
          <div style={{overflow:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:860}}>
              <thead><tr style={{background:"#222"}}>
                {["Mes","Clics","Registros","Dep. 1°","Tasa Conv.","Depósitos","NGR","Costo Afil.","ROI %","ROI $"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:h==="Mes"?"left":"right",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,color:"#777",whiteSpace:"nowrap",position:"sticky",top:0,background:"#222"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {tRows.map((v,i)=>{
                  const p=i>0?tRows[i-1]:null,isMTD=v.mo==="April 2026";
                  const mom=(c,pv)=>{if(!p||pv===undefined)return null;const d=pct(c,pv);if(d===null||!isFinite(d))return null;const up=d>=0;return <span style={{fontSize:10,fontWeight:600,color:up?"#22c55e":"#ef4444",marginLeft:3}}>{up?"▲":"▼"}{Math.abs(d).toFixed(1)}%</span>;};
                  return <tr key={v.mo} style={{borderBottom:"1px solid #2e2e2e",background:isMTD?"rgba(232,66,0,.07)":"transparent"}}>
                    <td style={{padding:"9px 12px",fontWeight:isMTD?700:400,whiteSpace:"nowrap"}}>{SHORT[v.mo]}{isMTD&&<span style={{marginLeft:6,fontSize:9,color:"#E84200",fontWeight:700}}>MTD</span>}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fN(v.cl)}{mom(v.cl,p&&p.cl)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fN(v.sg)}{mom(v.sg,p&&p.sg)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontWeight:700,color:"#E84200",fontVariantNumeric:"tabular-nums"}}>{fN(v.ft)}{mom(v.ft,p&&p.ft)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right"}}>{fP(v.cr)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fM(v.dep)}{mom(v.dep,p&&p.dep)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",color:v.ng>=0?"#22c55e":"#ef4444",fontVariantNumeric:"tabular-nums"}}>{fS(v.ng)}{mom(v.ng,p&&p.ng)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fM(v.co)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",color:roiColor(v.roi)}}>{fR(v.roi)}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",color:roiColor(v.roiM),fontVariantNumeric:"tabular-nums"}}>{fS(v.roiM)}{mom(v.roiM,p&&p.roiM)}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </Panel>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[["Dep. 1°","ft","#E84200",fN],["NGR","ng","#22c55e",fS],["Depósitos","dep","#3b82f6",fM],["ROI $","roiM","#ec4899",fS]].map(([label,key,color,fmt])=>(
            <Panel key={label}>
              <PH title={`${label} — Mensual`}/>
              <div style={{padding:"14px 18px"}}>
                {tRows.map(v=>{const val=v[key],maxV=Math.max(...tRows.map(r=>Math.abs(r[key])),1),c=val<0?"#ef4444":color;return(
                  <div key={v.mo} style={{display:"flex",alignItems:"center",marginBottom:8,gap:8}}>
                    <div style={{width:54,fontSize:10,color:"#777",flexShrink:0}}>{SHORT[v.mo]}</div>
                    <div style={{flex:1,background:"#2a2a2a",borderRadius:3,height:7,overflow:"hidden"}}><div style={{width:`${Math.abs(val)/maxV*100}%`,height:"100%",background:c,borderRadius:3}}/></div>
                    <div style={{fontSize:11,fontWeight:600,color:c,width:70,textAlign:"right"}}>{fmt(val)}</div>
                  </div>
                );})}
              </div>
            </Panel>
          ))}
        </div>
      </div>}
    </div>
    <div style={{textAlign:"center",padding:14,color:"#444",fontSize:11,borderTop:"1px solid #2e2e2e"}}>BetWarrior · Panel de Afiliados · Datos actualizados Abril 2026</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
